<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>민법 암기페이지</title><link rel="stylesheet" href="../assets/style.css?v=20260709-restore"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>민법 암기페이지</h1>
  <div class="sub">엑셀 검수본 기준. 반드시·암기카드·OX·빈칸·숫자만 시험용으로 정리.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <div class="dday" id="dday">D-계산중</div>
      <div class="sub">2026년 10월 31일 시험 기준</div>
      <div class="stat-row">
        <div class="stat"><strong id="mustCount">0</strong><span>반드시</span></div>
        <div class="stat"><strong id="quizCount">0</strong><span>채점문제</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>오답</span></div>
        <div class="stat"><strong id="favCount">0</strong><span>별표</span></div>
      </div>
    </div>
    <div class="panel">
      <strong>오늘 루틴</strong>
      <div class="sub">① 반드시 10개 → ② 암기카드 20개 → ③ OX/빈칸 직접 채점 → ④ 오답만 반복</div>
      <textarea id="memo" class="memo" placeholder="오늘 틀린 포인트 메모"></textarea>
    </div>
  </section>
  <div class="search">
    <input id="searchInput" type="search" placeholder="검색: 원시취득, 통정허위표시, 착오, 대리, 취득시효..." />
    <button id="resetBtn">초기화</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="folder-strip" id="folderStrip"></div>
  <section class="layout">
    <aside class="panel sidebar">
      <strong>📂 단원 폴더</strong>
      <div class="sub">큰단원 → 소단원으로 좁혀서 보기</div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="cards" id="cards"></section>
  </section>
  <div class="footer-note">함정은 정답 힌트가 되지 않도록 접기 상태로만 표시됩니다.</div>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="practice.html">문제은행</a><a href="mock.html">모의고사</a></nav>
<script src="../assets/minbeop-app.js?v=20260709-restore"></script>
</body>
</html>
