<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>학개론 암기페이지</title><link rel="stylesheet" href="../assets/style.css?v=20260710-hak-mnemonic"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>📐 부동산학개론</h1>
  <div class="sub">기초이론 1~7주차 복습정리 자료를 반영했습니다. 공식·계산, 개념비교, 빈칸을 분리했습니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <div class="dday" id="dday">D-계산중</div>
      <div class="sub">2026년 10월 31일 시험 기준 · 정식자료 반영</div>
      <div class="stat-row">
        <div class="stat"><strong id="mustCount">0</strong><span>반드시</span></div>
        <div class="stat"><strong id="formulaCount">0</strong><span>공식</span></div>
        <div class="stat"><strong id="quizCount">0</strong><span>빈칸</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>오답</span></div>
      </div>
    </div>
    <div class="panel">
      <strong>오늘 루틴</strong>
      <div class="sub">① 반드시 정리 → ② 공식요약 → ③ 공식·계산 → ④ 빈칸 → ⑤ 개념비교/오답</div>
      <textarea id="memo" class="memo" placeholder="오늘 틀린 학개론 공식·개념 메모"></textarea>
    </div>
  </section>

  <div class="search">
    <input id="searchInput" type="search" placeholder="검색: 탄력성, 유량, 저량, NPV, IRR, 대부비율, 부채감당률, 감정평가..." />
    <button id="resetBtn">초기화</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="folder-strip" id="folderStrip"></div>

  <section class="layout">
    <aside class="panel sidebar">
      <strong>📂 단원 폴더</strong>
      <div class="sub">학개론 → 대분류/중단원으로 좁혀 보기</div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="cards" id="cards"></section>
  </section>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="practice.html">문제은행</a><button onclick="setTab('wrong')">오답</button></nav>
<script src="../assets/hakgaeron-app.js?v=20260710-hak-mnemonic"></script>
<script src="../assets/hakgaeron-mnemonics.js?v=20260710-hak-mnemonic"></script>
</body>
</html>
