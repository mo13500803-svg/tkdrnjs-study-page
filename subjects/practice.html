<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>통합 문제은행</title><link rel="stylesheet" href="../assets/style.css?v=20260715-minbeop"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>통합 문제은행</h1>
  <div class="sub">기존 문제와 2026 예상문제에 숫자·기간·주체 중심의 필수암기 문제를 추가했습니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <strong>문제 조건</strong>
      <div class="filter-grid">
        <select id="subjectFilter" class="select"></select>
        <select id="unitFilter" class="select"></select>
        <select id="typeFilter" class="select"></select>
        <select id="roundFilter" class="select">
          <option value="">전체 출처</option><option value="암기">필수암기 문제</option><option value="예상">2026 예상문제</option><option value="1">모의 1회</option><option value="2">모의 2회</option><option value="3">모의 3회</option><option value="자료">추가자료</option>
        </select>
        <input id="keywordInput" class="quiz-input" placeholder="검색어: 취득세, 수요, 대리, 6월 1일..." />
      </div>
      <div class="card-actions">
        <button id="memoryBtn" class="memory-action">필수암기만</button>
        <button id="predictedBtn" class="predicted-action">2026 예상문제만</button>
        <button id="random20Btn">랜덤 20문제</button>
        <button id="random40Btn">랜덤 40문제</button>
        <button id="allBtn">조건 전체 보기</button>
        <button id="submitPracticeBtn">채점</button>
        <button id="resetPracticeBtn" type="button">초기화</button>
      </div>
    </div>
    <div class="panel">
      <strong>현재 세트</strong>
      <div class="stat-row">
        <div class="stat"><strong id="practiceTotal">0</strong><span>현재 표시</span></div>
        <div class="stat"><strong id="practiceMatched">0</strong><span>조건 일치</span></div>
        <div class="stat"><strong id="practiceAnswered">0</strong><span>응답</span></div>
        <div class="stat"><strong id="practiceScore">미제출</strong><span>정답</span></div>
      </div>
      <textarea id="practiceReportText" class="memo" style="min-height:100px"></textarea>
      <button id="copyPracticeReportBtn" style="margin-top:8px;width:100%">분석용 텍스트 복사</button>
    </div>
  </section>
  <section id="practiceAnalysis"></section>
  <section class="cards mock-list" id="practiceQuestions"></section>
  <div class="page-controls" id="pageControls">
    <button id="prevPageBtn" type="button">이전</button>
    <strong id="pageInfo">1 / 1</strong>
    <button id="nextPageBtn" type="button">다음</button>
  </div>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="mock.html">모의고사</a><button onclick="submitPractice()">채점</button><button onclick="resetPractice()">초기화</button></nav>
<script src="../assets/practice-app.js?v=20260715-minbeop"></script>
</body>
</html>
