<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>일반 문제은행</title><link rel="stylesheet" href="../assets/style.css?v=20260709-restore"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>일반 문제은행</h1>
  <div class="sub">모의고사 3회분 600문항을 반영한 과목별·단원별 일반 문제 연습 페이지입니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <strong>문제 조건</strong>
      <div class="filter-grid">
        <select id="subjectFilter" class="select"></select>
        <select id="unitFilter" class="select"></select>
        <select id="roundFilter" class="select">
          <option value="">전체 회차</option><option value="1">1회</option><option value="2">2회</option><option value="3">3회</option>
        </select>
        <input id="keywordInput" class="quiz-input" placeholder="검색어: 취득세, 수요, 대리, 6월 1일..." />
      </div>
      <div class="card-actions">
        <button id="random20Btn">랜덤 20문제</button>
        <button id="random40Btn">랜덤 40문제</button>
        <button id="allBtn">조건 전체 보기</button>
        <button id="submitPracticeBtn">채점</button>
        <button id="resetPracticeBtn" type="button">초기화</button>
      </div>
    </div>
    <div class="panel">
      <strong>현재 세트</strong>
      <div class="stat-row">
        <div class="stat"><strong id="practiceTotal">0</strong><span>문항</span></div>
        <div class="stat"><strong id="practiceAnswered">0</strong><span>응답</span></div>
        <div class="stat"><strong id="practiceScore">미제출</strong><span>정답</span></div>
        <div class="stat"><strong>600</strong><span>전체은행</span></div>
      </div>
      <textarea id="practiceReportText" class="memo" style="min-height:100px"></textarea>
      <button id="copyPracticeReportBtn" style="margin-top:8px;width:100%">분석용 텍스트 복사</button>
    </div>
  </section>
  <section id="practiceAnalysis"></section>
  <section class="cards mock-list" id="practiceQuestions"></section>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="mock.html">모의고사</a><button onclick="submitPractice()">채점</button><button onclick="resetPractice()">초기화</button></nav>
<script src="../assets/practice-app.js?v=20260709-restore"></script>
</body>
</html>
