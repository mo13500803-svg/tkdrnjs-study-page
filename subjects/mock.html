<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>공인중개사 모의고사·단원별 연습</title>
<link rel="stylesheet" href="../assets/style.css?v=20260723-unit-practice"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>공인중개사 모의고사·단원별 연습</h1>
  <div class="sub">회차별 모의고사를 풀거나, 1~3회 전체에서 같은 단원 문제만 모아 연습할 수 있습니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <strong id="examTitle">모의고사</strong>
      <div class="practice-filter-grid" style="margin-top:10px">
        <label class="filter-field">
          <span>학습 방식</span>
          <select id="practiceModeSelect" class="select" aria-label="학습 방식 선택">
            <option value="exam">회차별 모의고사</option>
            <option value="unit">단원별 연습</option>
          </select>
        </label>
        <label id="examSelectWrap" class="filter-field">
          <span>시험 선택</span>
          <select id="examSelect" class="select" aria-label="모의고사 선택"></select>
        </label>
        <label id="subjectSelectWrap" class="filter-field" hidden>
          <span>과목 선택</span>
          <select id="subjectSelect" class="select" aria-label="과목 선택"></select>
        </label>
        <label id="unitSelectWrap" class="filter-field" hidden>
          <span>단원 선택</span>
          <select id="unitSelect" class="select" aria-label="단원 선택"></select>
        </label>
      </div>
      <div class="stat-row">
        <div class="stat"><strong id="totalCount">0</strong><span>문항</span></div>
        <div class="stat"><strong id="answeredCount">0</strong><span>응답</span></div>
        <div class="stat"><strong id="scoreBox">미제출</strong><span>점수</span></div>
        <div class="stat"><strong id="submitState">-</strong><span>상태</span></div>
      </div>

      <section class="exam-timer" aria-labelledby="timerHeading">
        <div class="timer-head">
          <div>
            <strong id="timerHeading">⏱ 이 시험 시간</strong>
            <div class="sub" id="timerStatus">시작 전</div>
          </div>
          <output id="timerDisplay" class="timer-display" aria-live="off">00:00:00</output>
        </div>
        <div class="timer-actions">
          <button id="timerStartBtn" type="button">시간 시작</button>
          <button id="timerPauseBtn" type="button">일시정지</button>
          <button id="timerResetBtn" type="button">시간 초기화</button>
        </div>
        <div class="timer-note" id="timerNote">시험을 바꾸면 진행 중인 시간은 자동으로 일시정지됩니다. 답안 초기화와 시간 초기화는 별개입니다.</div>
      </section>

      <div class="card-actions">
        <button id="submitBtn" type="button">제출하고 채점</button>
        <button id="resetExamBtn" type="button">이 시험 답안 초기화</button>
      </div>
    </div>
    <div class="panel">
      <strong>사용법</strong>
      <div class="sub">단원별 연습을 선택하면 1~3회 모든 모의고사에서 해당 단원 문제만 모아 보여줍니다. 제출하면 타이머가 멈추고 정답·해설·약점분석이 열립니다.</div>
      <textarea id="reportText" class="memo" style="min-height:120px" readonly></textarea>
      <button id="copyReportBtn" type="button" style="margin-top:8px;width:100%">분석용 텍스트 복사</button>
    </div>
  </section>
  <section id="analysis"></section>
  <section class="cards mock-list" id="examQuestions"></section>
</main>
<nav class="mobile-bottom-nav">
  <a href="../index.html">홈</a>
  <button type="button" onclick="toggleTimer()">시간 시작/정지</button>
  <button type="button" onclick="submitExam()">채점</button>
</nav>
<script src="../assets/mock-exam-app.js?v=20260723-unit-practice"></script>
</body>
</html>
