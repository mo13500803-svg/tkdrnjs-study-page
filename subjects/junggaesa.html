<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>중개사법 암기페이지</title><link rel="stylesheet" href="../assets/style.css?v=20260709-progress"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>📗 중개사법</h1>
  <div class="sub">송성호 기본이론·핵심&기출·합격서·슛돌이·개정자료를 순서대로 반영했습니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <div class="dday" id="dday">D-계산중</div>
      <div class="sub">2026년 10월 31일 시험 기준 · 송성호 자료 반영</div>
      <div class="stat-row">
        <div class="stat"><strong id="mustCount">0</strong><span>반드시</span></div>
        <div class="stat"><strong id="summaryCount">0</strong><span>핵심요약</span></div>
        <div class="stat"><strong id="quizCount">0</strong><span>채점문제</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>오답</span></div>
      </div>
    </div>
    <div class="panel">
      <strong>오늘 루틴</strong>
      <div class="sub">① 반드시 → ② 핵심요약/슛돌이 → ③ 기간·숫자 → ④ OX/빈칸 → ⑤ 오답 반복</div>
      <textarea id="memo" class="memo" placeholder="오늘 틀린 중개사법 포인트 메모"></textarea>
    </div>
  </section>

  <div class="search">
    <input id="searchInput" type="search" placeholder="검색: 등록, 결격사유, 분사무소, 인장, 전속중개, 확인설명, 중개보수, 행정처분, 부신법..." />
    <button id="resetBtn">초기화</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="folder-strip" id="folderStrip"></div>

  <section class="layout">
    <aside class="panel sidebar">
      <strong>📂 단원 폴더</strong>
      <div class="sub">중개사법 → 세부단원으로 좁혀 보기</div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="cards" id="cards"></section>
  </section>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="practice.html">문제은행</a><button onclick="setTab('wrong')">오답</button></nav>
<script src="../assets/junggaesa-app.js?v=20260709-progress"></script>
</body>
</html>
