<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>등기법 암기페이지</title><link rel="stylesheet" href="../assets/style.css"/>
</head>
<body>
<header>
  <a class="home-link" href="gongsi.html">← 공시법으로</a>
  <h1>등기법 암기페이지</h1>
  <div class="sub">공시법 5~10주차 등기법 자료를 기준으로 만든 모바일 암기·문제 페이지입니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <div class="dday" id="dday">D-계산중</div>
      <div class="sub">2026년 10월 31일 시험 기준</div>
      <div class="stat-row">
        <div class="stat"><strong id="mustCount">0</strong><span>반드시</span></div>
        <div class="stat"><strong id="cardCount">0</strong><span>암기카드</span></div>
        <div class="stat"><strong id="quizCount">0</strong><span>채점문제</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>오답</span></div>
      </div>
    </div>
    <div class="panel">
      <strong>오늘 루틴</strong>
      <div class="sub">① 반드시 정리 → ② 암기카드 → ③ 기간별 → ④ OX/빈칸 채점</div>
      <textarea id="memo" class="memo" placeholder="오늘 틀린 등기법 포인트 메모"></textarea>
    </div>
  </section>

  <div class="search">
    <input id="searchInput" type="search" placeholder="검색: 가등기, 대지권, 등기필정보, 단독, 공동, 각하, 말소..." />
    <button id="resetBtn">초기화</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="folder-strip" id="folderStrip"></div>

  <section class="layout">
    <aside class="panel sidebar">
      <strong>📂 단원 폴더</strong>
      <div class="sub">등기법 → 세부단원으로 좁혀 보기</div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="cards" id="cards"></section>
  </section>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="gongsi.html">공시법</a><button onclick="setTab('wrong')">오답</button></nav>
<script src="../assets/deunggi-app.js"></script>
</body>
</html>
