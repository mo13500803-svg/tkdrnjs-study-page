<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>공법 임시페이지</title><link rel="stylesheet" href="../assets/style.css"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>🏗️ 공법</h1>
  <div class="sub">모의고사 문제를 기반으로 임시 구성한 공법 페이지입니다. 공법은 별도 체계도 자료가 생기면 완성도가 크게 올라갑니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <div class="dday" id="dday">D-계산중</div>
      <div class="sub">2026년 10월 31일 시험 기준 · 모의고사 기반 임시자료</div>
      <div class="stat-row">
        <div class="stat"><strong id="mustCount">0</strong><span>반드시</span></div>
        <div class="stat"><strong id="cardCount">0</strong><span>암기카드</span></div>
        <div class="stat"><strong id="quizCount">0</strong><span>객관식</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>오답</span></div>
      </div>
    </div>
    <div class="panel">
      <strong>오늘 루틴</strong>
      <div class="sub">① 법별 체계 확인 → ② 권한자·절차 암기 → ③ 객관식 풀이 → ④ 오답 반복</div>
      <textarea id="memo" class="memo" placeholder="오늘 틀린 포인트 메모"></textarea>
    </div>
  </section>
  <div class="search">
    <input id="searchInput" type="search" placeholder="검색: 국토계획법, 도시개발법, 정비법, 건축법, 농지법, 주택법..." />
    <button id="resetBtn">초기화</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="folder-strip" id="folderStrip"></div>
  <section class="layout">
    <aside class="panel sidebar">
      <strong>📂 단원 폴더</strong>
      <div class="sub">모의고사 단원분류 기준</div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="cards" id="cards"></section>
  </section>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="practice.html">문제은행</a><button onclick="setTab('wrong')">오답</button></nav>
<script src="../assets/gongbeop-app.js"></script>
</body>
</html>
