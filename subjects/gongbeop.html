<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8"/><meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>공법 암기페이지</title><link rel="stylesheet" href="../assets/style.css?v=20260709-noclip"/>
</head>
<body>
<header>
  <a class="home-link" href="../index.html">← 메인으로</a>
  <h1>🏙️ 부동산공법</h1>
  <div class="sub">한장공법 기본이론 + 핵심&기출 자료 + 진도별문제 1~3회를 순서대로 반영했습니다.</div>
</header>
<main>
  <section class="top-grid">
    <div class="panel">
      <div class="dday" id="dday">D-계산중</div>
      <div class="sub">2026년 10월 31일 시험 기준 · 정식자료 반영</div>
      <div class="stat-row">
        <div class="stat"><strong id="mustCount">0</strong><span>반드시</span></div>
        <div class="stat"><strong id="summaryCount">0</strong><span>핵심요약</span></div>
        <div class="stat"><strong id="quizCount">0</strong><span>채점문제</span></div>
        <div class="stat"><strong id="wrongCount">0</strong><span>오답</span></div>
      </div>
    </div>
    <div class="panel">
      <strong>오늘 루틴</strong>
      <div class="sub">① 반드시 → ② 기간·숫자 → ③ 절차표 → ④ 객관식/빈칸 → ⑤ 오답 반복</div>
      <textarea id="memo" class="memo" placeholder="오늘 틀린 공법 권자·기간·절차 메모"></textarea>
    </div>
  </section>

  <div class="search">
    <input id="searchInput" type="search" placeholder="검색: 국계법, 도시관리계획, 용도지역, 개발행위, 환지, 정비사업, 건축선, 농지..." />
    <button id="resetBtn">초기화</button>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="folder-strip" id="folderStrip"></div>

  <section class="layout">
    <aside class="panel sidebar">
      <strong>📂 단원 폴더</strong>
      <div class="sub">공법 → 법별/중단원으로 좁혀 보기</div>
      <div class="tree" id="tree"></div>
    </aside>
    <section class="cards" id="cards"></section>
  </section>
</main>
<nav class="mobile-bottom-nav"><a href="../index.html">홈</a><a href="practice.html">문제은행</a><button onclick="setTab('wrong')">오답</button></nav>
<script src="../assets/gongbeop-app.js?v=20260709-noclip"></script>
</body>
</html>
